version: '3.8'

services:
  vpn-burp:
    build: .
    container_name: vpn-burp
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "1194:1194/udp"
    environment:
      # LƯU Ý: Thay đổi IP này thành IP mạng LAN thực tế của bạn (nơi đang chạy Burp Suite)
      - PROXY_IP=192.168.100.1
    volumes:
      - ./openvpn_data:/etc/openvpn
      - ./output_config:/client_config